# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: Playwright
permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/crm/client/e2e/**'

  push:
    branches: [main]
    paths:
      - 'apps/crm/client/e2e/**'

  workflow_dispatch: {}

jobs:
  playwright:
    runs-on: ubuntu-latest
    environment: testing

    permissions:
      contents: read
      packages: read
      statuses: write

    container:
      # NOTE: playwright image version must match package.json playwright pkg
      image: mcr.microsoft.com/playwright:v1.60.0-noble

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PNPM
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.18.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build shared
        run: pnpm --filter @apps/crm-shared build

      - name: Build graphql codegen
        run: pnpm --filter @apps/crm-client codegen

      - name: Run Playwright tests
        run: pnpm --filter @apps/crm-client exec dotenvx run -f ./.env.ci.client.enc -- playwright test
        env:
          DOTENV_PRIVATE_KEY_CI_CLIENT: ${{ secrets.DOTENV_PRIVATE_KEY_CI_CLIENT }}

      - name: Playwright Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: apps/crm/client/playwright-report/
          retention-days: 5
