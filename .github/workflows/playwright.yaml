# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: Playwright
permissions: read-all

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/crm/client/**/*.spec.*'
      - 'apps/crm/client/**/*.test.*'
      - 'apps/crm/client/**/*.e2e.*'

  push:
    branches: [main]
    paths:
      - 'apps/crm/client/**/*.spec.*'
      - 'apps/crm/client/**/*.test.*'
      - 'apps/crm/client/**/*.e2e.*'

  workflow_dispatch: {}

jobs:
  playwright:
    runs-on: ubuntu-latest
    environment: testing
    env:
      NODE_ENV: test

    permissions:
      contents: read
      packages: read
      statuses: write

    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build shared
        run: pnpm --filter @apps/crm-shared build

      - name: Run Playwright tests
        run: pnpm --filter @apps/crm-client playwright:test
