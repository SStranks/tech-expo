# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/master/schema/compose-spec.json
---
services:
  nginx:
    container_name: ${NGINX_PUBLIC_CONTAINER:?error}
    image: nginx:1.31.3-alpine3.24@sha256:4a73073bd557c65b759505da037898b61f1be6cbcc3c2c3aeac22d2a470c1752
    restart: unless-stopped
    depends_on:
      node-api:
        condition: service_healthy
      nginx-react:
        condition: service_healthy
    environment:
      NGINX_PUBLIC_DOCKER_PORT_HTTP: ${NGINX_PUBLIC_DOCKER_PORT_HTTP:?error}
      NGINX_PUBLIC_DOCKER_PORT_TLS: ${NGINX_PUBLIC_DOCKER_PORT_TLS:?error}
      NGINX_REACT_CONTAINER: ${NGINX_REACT_CONTAINER:?error}
      NGINX_REACT_DOCKER_PORT_TLS: ${NGINX_REACT_DOCKER_PORT_TLS:?error}
      EXPRESS_CONTAINER: ${EXPRESS_CONTAINER:?error}
      EXPRESS_DOCKER_PORT: ${EXPRESS_DOCKER_PORT:?error}
    ports:
      - 127.0.0.1:${NGINX_PUBLIC_LOCAL_PORT_HTTP}:${NGINX_PUBLIC_DOCKER_PORT_HTTP}
      - 127.0.0.1:${NGINX_PUBLIC_LOCAL_PORT_TLS}:${NGINX_PUBLIC_DOCKER_PORT_TLS}
    volumes:
      - tmpfs-certs:/etc/nginx/certs:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    networks:
      - techexpo-crm-backend
    security_opt:
      - no-new-privileges
    healthcheck:
      test: [CMD-SHELL, 'wget --spider -q http://127.0.0.1:$NGINX_PUBLIC_DOCKER_PORT_HTTP/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
      start_interval: 2s

  express-api:
    build:
      context: .
      dockerfile: apps/crm/docker/nodejs/Dockerfile
      args:
        EXPRESS_EXPOSE_PORT: ${EXPRESS_EXPOSE_PORT:?error}
        NODE_VERSION: ${NODE_VERSION:?error}
        IMAGE_VERSION: ${NODE_CUSTOM_IMAGE_VERSION:?error}
        IMAGE_AUTHOR: ${IMAGE_AUTHOR:?error}
    image: techexpo-crm/express-api:latest
    restart: unless-stopped
    env_file:
      - ${ENV_DIR}/.env.prod.server
      - ${ENV_DIR}/.env.prod.docker
    volumes:
      - tmpfs-certs:/etc/expressjs/certs:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          wget --ca-certificate=/certs/expressjs-ca.crt
          --certificate=/certs/expressjs-healthcheck.crt
          --private-key=/certs/expressjs-healthcheck.key
          --spider -q https://localhost:$EXPRESS_EXPOSE_PORT/health
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s
      start_interval: 5s

  nginx-react:
    build:
      context: .
      dockerfile: ./nginx-react/Dockerfile
      args:
        REACT_VERSION: ${REACT_VERSION:?error}
        IMAGE_VERSION: ${REACT_CUSTOM_IMAGE_VERSION:?error}
        IMAGE_AUTHOR: ${IMAGE_AUTHOR:?error}
    image: techexpo-crm/nginx-react:latest
    restart: unless-stopped
    env_file:
      - ${ENV_DIR}/.env.prod.client
    expose:
      - '443'
    volumes:
      - tmpfs-certs:/etc/nginx-react/certs:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          wget --ca-certificate=/certs/nginxreact-ca.crt
          --certificate=/certs/nginxreact-healthcheck.crt
          --private-key=/certs/nginxreact-healthcheck.key
          --spider -q https://localhost:$NGINX_REACT_EXPOSE_PORT/health
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s
      start_interval: 5s

  mongo:
    image: mongo:8.3.4@sha256:309d760ba3f7962e14d54ac6123c7fe72ed2d465196b4d0eaf8abcea7dd39450
    command: [mongod, --auth, --quiet, --config, /etc/mongod.conf]
    restart: unless-stopped
    ports: []
    volumes:
      - tmpfs-certs:/etc/mongo/certs:ro
      - volume-mongo:/data/db
      - ./mongo/mongod.conf:/etc/mongod.conf:ro
      - ./mongo/mongo-init.sh:/docker-entrypoint-initdb.d/mongo-init.sh:ro
      - ./mongo/mongo-healthcheck.sh:/usr/local/bin/mongo-healthcheck.sh:ro
    depends_on:
      certs:
        condition: service_healthy
    healthcheck:
      test: [CMD, /bin/bash, /usr/local/bin/mongo-healthcheck.sh]
      interval: 30s
      timeout: 5s
      retries: 5
      start_interval: 5s
      start_period: 30s

  postgres:
    image: postgres:18.3@sha256:7e32e9833a6fb1c92c32552794cb6ed569d51b445a54907d35fc112ef39684db
    restart: unless-stopped
    shm_size: 128mb
    ports: []
    volumes:
      - tmpfs-certs:/etc/postgres/certs:ro
      - volume-postgres:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
      - ./postgres/scripts:/usr/local/bin/scripts:ro
    depends_on:
      certs:
        condition: service_healthy
    healthcheck:
      test: [CMD, /bin/bash, /usr/local/bin/scripts/postgres-healthcheck.sh]
      interval: 30s
      timeout: 5s
      retries: 5
      start_interval: 5s
      start_period: 30s
    user: postgres

  redis:
    image: redis:8.8.0-alpine3.23@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    restart: unless-stopped
    ports: []
    volumes:
      - tmpfs-certs:/etc/redis/certs:ro
      - volume-redis:/data
      - ./redis/redis-healthcheck.sh:/usr/local/bin/redis-healthcheck.sh:ro
      - ./redis/redis-init.sh:/usr/local/bin/redis-init.sh:ro
    depends_on:
      certs:
        condition: service_healthy
    healthcheck:
      test: [CMD, /bin/sh, /usr/local/bin/redis-healthcheck.sh]
      interval: 30s
      timeout: 5s
      retries: 5
      start_interval: 5s
      start_period: 15s
    entrypoint: [/usr/local/bin/redis-init.sh]

  grafana:
    image: grafana/grafana:13.1.0@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    restart: unless-stopped
    environment:
      GF_LOG_LEVEL: error
    ports:
      - '127.0.0.1:${GRAFANA_LOCAL_PORT:?error}:${GRAFANA_DOCKER_PORT:?error}'
    volumes:
      - tmpfs-certs:/etc/grafana/certs:ro
      - volume-grafana:/var/lib/grafana
    healthcheck:
      test: [CMD-SHELL, 'wget --spider -q http://127.0.0.1:$NGINX_METRICS_DOCKER_PORT_HTTP/grafana/healthcheck']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
      start_interval: 2s

  prometheus:
    image: prom/prometheus:v3.5.5@sha256:332c2f43e7e389d74d3893b55bb02fbbd684208e681eeb604641d5d769c0fe2a
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.config.file=/etc/prometheus/auth.yml
      - --log.level=error
    restart: unless-stopped
    ports:
      - '127.0.0.1:${PROMETHEUS_LOCAL_PORT:?error}:${PROMETHEUS_DOCKER_PORT:?error}'
    volumes:
      - tmpfs-certs:/etc/prometheus/certs:ro
      - volume-prometheus:/prometheus
    healthcheck:
      test: [CMD-SHELL, 'wget --spider -q http://127.0.0.1:$NGINX_METRICS_DOCKER_PORT_HTTP/prometheus/healthcheck']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
      start_interval: 2s

  certs:
    container_name: ${CERTS_CONTAINER:?error}
    image: node:22.22.3-alpine3.22@sha256:cd7807368cf24826297cbad5dca1a44972ccfd770647db52a8c7589eb4599ac8
    restart: no
    volumes:
      - tmpfs-certs:/certs:rw
      - ${CERTS_DIR}/prod:/src:ro
      - ./certs/certs-init.sh:/usr/local/bin/certs-init.sh:ro
    entrypoint: [/usr/local/bin/certs-init.sh]
    healthcheck:
      test: [CMD, test, -f, /certs/.ready]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 10s
      start_interval: 2s

volumes:
  tmpfs-certs:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: 'uid=1001,gid=1001,mode=705'
  volume-mongo:
    name: techexpo-mongo-prod
    external: true
  volume-postgres:
    name: techexpo-postgres-prod
    external: true
  volume-redis:
    name: techexpo-redis-prod
    external: true
  volume-grafana:
    name: techexpo-grafana-prod
    external: true
  volume-prometheus:
    name: techexpo-prometheus-prod
    external: true
