# eslint-disable @graphql-eslint/require-description
# lint-disable-line relay-page-info-spec
# lint-disable types-have-descriptions, fields-have-descriptions

type Query {
  quote(input: QuoteInput!): QuoteDetailed!
  quotesOverview(input: QuotesOverviewInput!): QuotesOverviewPaginated!
}

type Mutation {
  createQuote(input: CreateQuoteInput!): Quote!
  updateQuote(input: UpdateQuoteInput!): Quote!
  removeQuote(input: RemoveQuoteInput!): UUID!
  createQuoteService(input: CreateQuoteServiceInput!): QuoteServicePayload!
  updateQuoteService(input: UpdateQuoteServiceInput!): QuoteServicePayload!
  removeQuoteService(input: RemoveQuoteServiceInput!): UUID!
  createQuoteNote(input: CreateQuoteNoteInput!): QuoteNotePayload!
  updateQuoteNote(input: UpdateQuoteNoteInput!): QuoteNotePayload!
  removeQuoteNote(input: RemoveQuoteNoteInput!): UUID!
}

type QuoteServicePayload {
  id: ID!
  quote: Quote!
  quoteService: QuoteService!
}

type QuoteNotePayload {
  id: ID!
  quote: Quote!
  quoteNote: QuoteNote!
}

type Quote {
  id: UUID!
  title: String!
  company: Company!
  totalAmount: Money!
  salesTax: Float!
  stage: QuoteStage!
  preparedFor: Contact!
  preparedBy: UserProfile!
  issuedAt: DateTime
  dueAt: DateTime
}

type QuoteDetailed {
  id: UUID!
  title: String!
  company: Company!
  totalAmount: Money!
  salesTax: Float!
  stage: QuoteStage!
  preparedFor: Contact!
  preparedBy: UserProfile!
  issuedAt: DateTime
  dueAt: DateTime
  services: [QuoteService!]!
  note: QuoteNote
}

type QuoteOverview {
  id: UUID!
  title: String!
  company: CompanyAvatar!
  totalAmount: Money!
  stage: QuoteStage!
  preparedFor: ContactAvatar!
  preparedBy: UserProfileAvatar!
  createdAt: DateTime!
}

type QuotesOverviewPaginated {
  id: ID!
  items: [QuoteOverview!]!
  totalCount: Int!
}

type QuoteService {
  id: UUID!
  title: String!
  price: Money!
  quantity: Int!
  discount: Float!
  totalAmount: Money!
}

type QuoteNote {
  id: UUID!
  content: String!
}

input QuoteInput {
  id: UUID!
}

input QuotesOverviewInput {
  filters: QuotesOverviewFiltersInput
  sort: [QuotesOverviewSort]!
  pagination: QuotesOverviewPaginationInput
}

input QuotesOverviewFiltersInput {
  searchQuoteTitle: String
  searchCompanyById: UUID
  searchStage: QuoteStage
  searchPreparedByUserProfileId: UUID
}

input QuotesOverviewSort {
  field: QuoteSortableField!
  direction: SortDirection
}

input QuotesOverviewPaginationInput {
  id: UUID
}

input CreateQuoteInput {
  clientGeneratedId: UUID
  title: String!
  companyId: UUID!
  preparedForContactId: UUID!
  preparedByUserProfileId: UUID!
}

input UpdateQuoteInput {
  id: UUID!
  title: String
  companyId: UUID
  preparedForContactId: UUID
  preparedByUserProfileId: UUID
  stage: QuoteStage
}

input RemoveQuoteInput {
  id: UUID!
}

input CreateQuoteNoteInput {
  quoteId: UUID!
  content: String!
}

input UpdateQuoteNoteInput {
  quoteId: UUID!
  quoteNoteId: UUID!
  content: String
}

input RemoveQuoteNoteInput {
  quoteId: UUID!
  quoteNoteId: UUID!
}

input CreateQuoteServiceInput {
  clientGeneratedId: UUID
  quoteId: UUID!
  title: String!
  price: MoneyInput!
  quantity: Int!
  discount: Float!
  totalAmount: MoneyInput!
}

input UpdateQuoteServiceInput {
  quoteId: UUID!
  quoteServiceId: UUID!
  title: String
  price: MoneyInput
  quantity: Int
  discount: Float
  totalAmount: MoneyInput
}

input RemoveQuoteServiceInput {
  quoteId: UUID!
  quoteServiceId: UUID!
}

enum QuoteStage {
  DRAFT
  SENT
  ACCEPTED
}

enum QuoteSortableField {
  AMOUNT
  CREATED_AT
}
