# eslint-disable @graphql-eslint/require-description
# lint-disable-line relay-page-info-spec
# lint-disable types-have-descriptions, fields-have-descriptions

type Query {
  calendarByMonth(input: CalendarByMonthInput!): CalendarByMonthPayload
  calendarCategories(input: CalendarCategoriesInput!): CalendarCategoriesPayload
  calendarEvent(input: CalendarEventInput!): CalendarEventPayload
  calendarInitialData(input: CalendarIntitialDataInput!): CalendarInitialPayload
}

type Mutation {
  createCategory(input: CreateCategoryInput!): CalendarCategoryPayload!
  createEvent(input: CreateEventInput!): CalendarEventPayload!
  removeCategory(input: RemoveCategoryInput!): UUID!
  removeEvent(input: RemoveEventInput!): UUID!
  updateEvent(input: UpdateEventInput!): CalendarEventPayload!
}

type CalendarByMonthPayload {
  id: ID!
  events: [CalendarEvent!]!
}

type CalendarInitialPayload {
  id: ID!
  categories: [CalendarCategory!]!
  events: [CalendarEvent!]!
}

type CalendarCategoriesPayload {
  id: ID!
  calendarCategories: [CalendarCategory!]!
}

type CalendarCategoryPayload {
  id: ID!
  calendarCategory: CalendarCategory!
}

type CalendarCategory {
  id: UUID!
  title: String!
}

type CalendarEvent {
  id: UUID!
  category: CalendarCategory
  color: HexColorCode
  description: String
  endTime: DateTime!
  participants: [UserProfileAvatar!]!
  startTime: DateTime!
  title: String!
}

type CalendarEventPayload {
  id: ID!
  calendarEvent: CalendarEvent!
  participants: [UserProfileAvatar!]!
}

input CalendarIntitialDataInput {
  calendarId: UUID!
  companyId: UUID!
  month: Int!
  year: Int!
}

input CalendarByMonthInput {
  calendarId: UUID!
  companyId: UUID!
  month: Int!
  year: Int!
}

input CalendarCategoriesInput {
  calendarId: UUID!
  companyId: UUID!
}

input CalendarEventInput {
  calendarEventId: UUID!
  calendarId: UUID!
}

input CreateEventInput {
  calendarId: UUID!
  categoryId: UUID!
  clientGeneratedId: UUID
  color: HexColorCode!
  description: String!
  endTime: DateTime!
  participants: [UUID!]!
  startTime: DateTime!
  title: String!
}

input UpdateEventInput {
  id: UUID!
  calendarId: UUID!
  categoryId: UUID
  color: HexColorCode
  description: String
  endTime: DateTime
  participants: [UUID!]
  startTime: DateTime
  title: String
}

input RemoveEventInput {
  calendarEventId: UUID!
  calendarId: UUID!
}

input CreateCategoryInput {
  calendarId: UUID!
  clientGeneratedId: UUID
  title: String!
}

input RemoveCategoryInput {
  calendarCategoryId: UUID!
  calendarId: UUID!
}
