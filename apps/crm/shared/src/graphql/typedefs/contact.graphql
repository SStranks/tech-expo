# eslint-disable @graphql-eslint/require-description
# lint-disable-line relay-page-info-spec
# lint-disable types-have-descriptions, fields-have-descriptions

type Query {
  contact(input: ContactInput!): ContactDetailed!
  contactsOverview(input: ContactsOverviewInput!): ContactsOverviewPaginated!
}

type Mutation {
  createContact(input: CreateContactInput!): Contact!
  createContactNote(input: CreateContactNoteInput!): ContactNotePayload!
  removeContact(input: RemoveContactInput!): UUID!
  removeContactNote(input: RemoveContactNoteInput!): UUID!
  updateContact(input: UpdateContactInput!): Contact!
  updateContactNote(input: UpdateContactNoteInput!): ContactNotePayload!
}

type Contact {
  id: UUID!
  company: Company!
  email: EmailAddress!
  firstName: String!
  jobTitle: String!
  lastName: String!
  phone: String!
  stage: ContactStage!
  timezone: TimeZone
}

type ContactDetailed {
  id: UUID!
  company: Company!
  email: EmailAddress!
  firstName: String!
  jobTitle: String!
  lastName: String!
  notes: [ContactNote!]!
  phone: String!
  stage: ContactStage!
  timezone: TimeZone
}

type ContactOverview {
  id: UUID!
  company: Company!
  email: EmailAddress!
  firstName: String!
  jobTitle: String!
  lastName: String!
  stage: ContactStage!
}

type ContactNote {
  id: UUID!
  createdAt: DateTime!
  createdBy: UserProfileAvatar!
  note: String!
}

type ContactAvatar {
  id: UUID!
  firstName: String!
  image: String
  lastName: String!
}

type ContactsOverviewPaginated {
  id: ID!
  items: [ContactOverview!]!
  totalCount: Int!
}

type ContactNotePayload {
  id: ID!
  contact: Contact!
  contactNote: ContactNote!
}

input ContactInput {
  id: UUID!
}

input ContactsOverviewInput {
  filters: ContactsOverviewFiltersInput
  pagination: PaginationInput
  sort: ContactsOverviewSortInput
}

input ContactsOverviewFiltersInput {
  companyId: UUID
  searchContactEmail: String
  searchContactJobTitle: String
  searchContactName: String
  searchContactStage: ContactStage
}

input ContactsOverviewSortInput {
  sort: [ContactOverviewSort]!
}

input ContactOverviewSort {
  direction: SortDirection
  field: ContactSortableField!
}

input CreateContactInput {
  clientGeneratedId: UUID
  companyId: UUID!
  email: EmailAddress!
  firstName: String!
  image: String
  jobTitle: String!
  lastName: String!
  phone: String!
  stage: ContactStage!
  timezone: UUID
}

input UpdateContactInput {
  id: UUID!
  companyId: UUID
  email: EmailAddress
  firstName: String
  image: String
  jobTitle: String
  lastName: String
  phone: String
  stage: ContactStage
  timezone: UUID
}

input RemoveContactInput {
  id: UUID!
}

input CreateContactNoteInput {
  clientGeneratedId: UUID
  contactId: UUID!
  note: String!
}

input RemoveContactNoteInput {
  contactId: UUID!
  contactNoteId: UUID!
}

input UpdateContactNoteInput {
  contactId: UUID!
  contactNoteId: UUID!
  note: String
}

enum ContactStage {
  NEW
  CONTACTED
  INTERESTED
  UNQUALIFIED
  QUALIFIED
  NEGOTIATION
  LOST
  WON
  CHURNED
}

enum ContactSortableField {
  STATUS
}
