packages:
  - apps/**
  - packages/**

injectWorkspacePackages: true

minimumReleaseAge: 7200

allowBuilds:
  argon2: true
  core-js: true
  cypress: true
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true
  '@apollo/protobufjs': true
  bcrypt: true
  secp256k1: true
  '@swc/core': true
  '@parcel/watcher': true
  core-js-pure: true
overrides:
  browserslist: ^4.28.0
